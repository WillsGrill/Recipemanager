<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Will's Grill Studio</title>

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="brand">

            <h1>Will's Grill</h1>

            <span>Studio</span>

        </div>

        <nav>

            <a href="index.html" class="active">
                Dashboard
            </a>

            <a href="pages/recipes.html">
                Recipes
            </a>

            <a href="pages/ingredients.html">
                Ingredients
            </a>

            <a href="pages/images.html">
                Images
            </a>

            <a href="pages/validation.html">
                Validation
            </a>

            <a href="pages/settings.html">
                Settings
            </a>

        </nav>

    </aside>

    <main class="content">

        <header>

            <h2>Dashboard</h2>

            <p>
                Welcome to Will's Grill Studio.
            </p>

        </header>

        <section class="dashboard-grid">

            <div class="card">

                <h3>Recipes</h3>

                <div class="stat" id="recipeCount">
                    --
                </div>

                <p>Manage all recipes.</p>

            </div>

            <div class="card">

                <h3>Ingredients</h3>

                <div class="stat" id="ingredientCount">
                    --
                </div>

                <p>Manage ingredients.</p>

            </div>

            <div class="card">

                <h3>Images</h3>

                <div class="stat">
                    📷
                </div>

                <p>Manage recipe images.</p>

            </div>

            <div class="card">

                <h3>Validation</h3>

                <div class="stat">
                    ✔
                </div>

                <p>Check project health.</p>

            </div>

        </section>

    </main>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/app.js"></script>

</body>

</html>
